<!-- შექმენით form ა 6 შესაყვანი ველით და გენდერის ასარჩევით, გამოიყენეთ ყველა ატრიბუტი -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form A</title>
 </head>
 <body>
    <center>
        <h1>Form A</h1>
        <form>
            <label for = "first name">first name</label>
            <input type = "text" id = "first name" name = "first name" maxlength = "20" minlength = "2" required>
            <br>
            <label for = "last name">last name</label> 
            <input type = "text" id = "last name" name = "last name" maxlength = "20" minlength = "2" required>
            <br>
            <label for = "email">email</label>
            <input type = "email" id = "email" name = "email"  maxlength = "20" minlength = "2" required>
            <br>
            <label for = "password">password</label>
            <input type = "password" id = "password" name = "password" maxlength = "20" minlength = "2" required>
            <br>
            <label for = "age">age</label>
            <input type = "number" id = "age" name = "age" min = "18" max = "100" required>
            <br>
            <br>
            <label for = "comment">comment</label>
            <input id = "comment" name = "comment" maxlength = "200" minlength = "10" required></input>
            <br>
            <label for = "male">male</label>
            <input type = "radio" id = "male" name = "gender" value = "male" required>
            <label for = "female">female</label>
            <input type = "radio" id = "female" name = "gender" value = "female" required>
            

            <input type = "submit" value = "Submit">
        </form>
    </center>
 </body>
 </html>
