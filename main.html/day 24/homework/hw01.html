<!--  შექმენით ქვეეყნის შესარჩევი drop down menu 10 ქვეყნით -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select countrie</title>
</head>
<body>
    <form>
        <label for="country">Select a country:</label>
        <select id="country">
            <option value="GE" selected>Georgia</option>
            <option value="TU" selected>Turkey</option>
            <option value="RU" selected>Russia</option>
            <option value="US" selected>United States</option>
            <option value="DE" selected>Germany</option>
            <option value="FR" selected>France</option>
            <option value="IT" selected>Italy</option>
            <option value="ES" selected>Spain</option>
            <option value="CN" selected>China</option>
            <option value="JP" selected>Japan</option>
        </select>
        <input type="submit">
    </form>
</body>
</html>
